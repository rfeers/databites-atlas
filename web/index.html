<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataBites Atlas — Catalonia</title>

  <!-- MapLibre GL -->
  <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>

  <!-- Chroma.js (colour scales) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-header">
      <div class="brand">DataBites Atlas</div>
      <h1>Catalonia</h1>
      <p>Socio-economic indicators at census tract level</p>
    </div>

  <!-- minimap + jump to side by side -->
    <div id="sidebar-overview">
      <div id="minimap-wrap">
        <div class="sidebar-section-title">View</div>
        <div id="minimap"></div>
      </div>
      <div id="jumpto-wrap">
        <div class="sidebar-section-title">Jump to</div>
        <div id="jumpto-list"></div>
      </div>
    </div>

    <!-- variable picker -->
    <div id="sidebar-vars">
      <div class="sidebar-section-title">Variable</div>
      <div id="var-list"></div>
    </div>


    <!-- featured top/bottom -->
    <div id="sidebar-featured">
      <div class="sidebar-section-title">Featured</div>
      <div id="featured-list"></div>
    </div>

  </div>

  <div id="map">
    <div id="tooltip"></div>
    <div id="detail-panel" style="display:none">
      <div id="detail-header">
        <div id="detail-title"></div>
        <button id="detail-close">✕</button>
      </div>
      <div id="detail-rows"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>

</body>
</html>
